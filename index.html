*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;overflow:hidden}

.muted{color:var(--muted)}
.gold{color:var(--gold)}
button{font-family:inherit;border:0;cursor:pointer;color:inherit;background:transparent}

/* ===== DECK ===== */
#deck{position:relative;width:100vw;height:100vh;overflow:hidden;perspective:1600px}
.slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:5vh 6vw;opacity:0;visibility:hidden;transform:translate3d(0,0,0);transition:visibility 0s linear .8s}
.slide.active{opacity:1;visibility:visible;transition:visibility 0s}
.container{max-width:1280px;width:100%;margin:0 auto;position:relative;z-index:3}

/* ===== Background image layer ===== */
.bg-layer{position:absolute;inset:-4%;background-size:cover;background-position:center;will-change:transform,filter;filter:brightness(.9)}
.bg-layer::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(251,247,242,.15) 0%,rgba(251,247,242,.85) 100%)}
.slide.dark .bg-layer{filter:brightness(.55)}
.slide.dark .bg-layer::after{background:linear-gradient(135deg,rgba(15,5,9,.05) 0%,rgba(15,5,9,.7) 100%)}

/* ===== Particles canvas ===== */
#fx{position:fixed;inset:0;pointer-events:none;z-index:1;mix-blend-mode:soft-light;opacity:.85}

/* ===== Grain overlay ===== */
.grain{position:fixed;inset:0;pointer-events:none;z-index:60;opacity:.07;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='140' height='140' filter='url(%23n)'/></svg>");mix-blend-mode:overlay}

.kicker{font:700 .68rem 'Inter';letter-spacing:.22em;text-transform:uppercase;color:var(--gold)}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.2rem;border-radius:999px;background:rgba(255,255,255,.6);backdrop-filter:blur(14px);border:1px solid var(--line);color:var(--ink);font:600 .82rem 'Inter';transition:transform .2s var(--ease,cubic-bezier(.23,1,.32,1)),background .2s,box-shadow .2s}

.btn:active{transform:scale(.97)}
.btn.dark{background:rgba(15,5,9,.6);color:var(--cream);border-color:rgba(212,165,116,.25)}
.btn.dark:hover{background:rgba(15,5,9,.8)}

/* ===== Top bar ===== */
.topbar{position:fixed;top:18px;left:20px;right:20px;display:flex;align-items:center;justify-content:space-between;z-index:50}
.brand{display:flex;align-items:center;gap:.6rem;font-family:'Cormorant Garamond';font-size:1.3rem;color:var(--ink);letter-spacing:.05em;background:rgba(255,255,255,.5);backdrop-filter:blur(14px);padding:.4rem .9rem;border-radius:999px;border:1px solid var(--line)}

.toolbar{display:flex;gap:.4rem;align-items:center}

/* small util */

.tiles-wrapper{position:relative}

/* ============================================================
   RENDER · build deck for the active vertical
============================================================ */
const deck=document.getElementById('deck');
const vsw=document.getElementById('vsw');
const ctrls=document.getElementById('controls');
const progressEl=document.getElementById('progress');

// Build vertical switcher
Object.keys(VERTICALS).forEach(k=>{
  const b=document.createElement('button');
  b.dataset.k=k;b.textContent=VERTICALS[k].label;
  b.onclick=()=>setVertical(k);
  vsw.appendChild(b);
});

let currentSlides=[];
let i=0;
let autoplay=null;

function setVertical(key){
  const V=VERTICALS[key];
  document.body.dataset.vertical=key;
  // theme tokens
  const t=V.theme;
  const r=document.documentElement.style;
  r.setProperty('--bg',t.bg);r.setProperty('--ink',t.ink);
  r.setProperty('--berry',t.berry);r.setProperty('--berry-2',t.berry2);
  r.setProperty('--rose',t.rose);r.setProperty('--gold',t.gold);
  r.setProperty('--cream',t.cream);r.setProperty('--muted',t.muted);
  r.setProperty('--line',t.line);r.setProperty('--accent-soft',t.accent);
  document.title=`${V.name} · ${V.tagline}`;

  // mark active in switcher
  [...vsw.children].forEach(b=>b.classList.toggle('on',b.dataset.k===key));

  // build slides
  currentSlides=SLIDES(V);
  deck.innerHTML='';
  progressEl.innerHTML='';
  currentSlides.forEach((s,idx)=>{
    const el=document.createElement('section');
    el.className='slide'+(s.kind==='dark'?' dark':'');
    el.dataset.bg=s.kind;
    el.innerHTML=
      (s.bg?`<div class="bg-layer" style="background-image:url('${s.bg}')"></div>`:'')+
      `<div class="container">${s.html}</div>`;
    deck.appendChild(el);
    const p=document.createElement('span');progressEl.appendChild(p);
    el.querySelectorAll('[data-go]').forEach(c=>c.addEventListener('click',()=>{setVertical(c.dataset.go);transition(0,'right');}));
  });
  i=Math.min(i,currentSlides.length-1);
  showInstant(i);
}

/* ============================================================
   ANIMATION ENGINE
============================================================ */
const ease='power3.out';
const easeIO='power3.inOut';

function splitTitle(el){
  if(el.dataset.split)return;
  el.dataset.split='1';
  const html=el.innerHTML;
  // Wrap each character that is a letter; preserve <em>, <br/>, spaces
  const tmp=document.createElement('div');tmp.innerHTML=html;
  const walk=(node)=>{
    if(node.nodeType===3){
      const txt=node.textContent;
      const frag=document.createDocumentFragment();
      [...txt].forEach(ch=>{
        if(ch===' '||ch==='\u00a0'){frag.appendChild(document.createTextNode(ch));return}
        const sp=document.createElement('span');sp.textContent=ch;frag.appendChild(sp);
      });
      node.replaceWith(frag);
    } else if(node.nodeType===1 && node.tagName!=='BR'){
      [...node.childNodes].forEach(walk);
    }
  };
  [...tmp.childNodes].forEach(walk);
  el.innerHTML=tmp.innerHTML;
}

function animateSlide(slide,dir='right'){
  const tl=gsap.timeline();
  // bg parallax in
  const bg=slide.querySelector('.bg-layer');
  if(bg){tl.fromTo(bg,{scale:1.12,opacity:.85},{scale:1,opacity:1,duration:1.6,ease:'power2.out'},0)}
  // title letter animation
  const title=slide.querySelector('.split-letters');
  if(title){splitTitle(title);const chars=title.querySelectorAll('span');gsap.set(chars,{display:'inline-block',opacity:0,y:24,rotateX:-30});tl.to(chars,{opacity:1,y:0,rotateX:0,duration:.55,ease,stagger:.018},.05);}
  // generic reveals
  const r=slide.querySelectorAll('.r');
  if(r.length)tl.fromTo(r,{opacity:0,y:28},{opacity:1,y:0,duration:.7,ease,stagger:.07},.15);
  const rf=slide.querySelectorAll('.r-fade');
  if(rf.length)tl.fromTo(rf,{opacity:0},{opacity:1,duration:.7,ease,stagger:.06},.2);
  const rs=slide.querySelectorAll('.r-scale');
  if(rs.length)tl.fromTo(rs,{opacity:0,scale:.95},{opacity:1,scale:1,duration:.85,ease},.2);
  // counter stats
  slide.querySelectorAll('[data-count]').forEach(el=>{
    const target=parseFloat(el.dataset.count);
    const suffix=el.dataset.suffix||'';
    const obj={n:0};
    tl.to(obj,{n:target,duration:1.4,ease:'power2.out',onUpdate(){el.textContent=Math.round(obj.n)+suffix}},.4);
  });
}

function showInstant(n){
  [...deck.children].forEach((el,k)=>el.classList.toggle('active',k===n));
  [...progressEl.children].forEach((el,k)=>el.classList.toggle('active',k===n));
  document.body.style.background=currentSlides[n].kind==='dark'?'#0e0408':'var(--bg)';
  ctrls.classList.toggle('dark-controls',currentSlides[n].kind==='dark');
  animateSlide(deck.children[n]);
}

function transition(toIdx,dir='right'){
  toIdx=Math.max(0,Math.min(currentSlides.length-1,toIdx));
  if(toIdx===i)return;
  const cur=deck.children[i];
  const nxt=deck.children[toIdx];
  // out animation on current
  const tl=gsap.timeline({onComplete(){
    cur.classList.remove('active');
    nxt.classList.add('active');
    [...progressEl.children].forEach((el,k)=>el.classList.toggle('active',k===toIdx));
    document.body.style.background=currentSlides[toIdx].kind==='dark'?'#0e0408':'var(--bg)';
    ctrls.classList.toggle('dark-controls',currentSlides[toIdx].kind==='dark');
    i=toIdx;
    animateSlide(nxt,dir);
  }});
  // curtain wipe
  const curtain=document.getElementById('curtain');
  tl.set(curtain,{transformOrigin: dir==='right'?'left':'right',scaleX:0});
  tl.to(curtain,{scaleX:1,duration:.45,ease:easeIO},0);
  tl.to(cur,{opacity:0,scale:.98,duration:.4,ease:easeIO},0);
  tl.set(curtain,{transformOrigin: dir==='right'?'right':'left'},.5);
  tl.to(curtain,{scaleX:0,duration:.55,ease:easeIO},.55);
}

/* ============================================================
   CONTROLS · keys, wheel, touch, autoplay, fullscreen
============================================================ */
document.getElementById('next').onclick=()=>transition(i+1,'right');
document.getElementById('prev').onclick=()=>transition(i-1,'left');
document.getElementById('full').onclick=()=>{
  if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
};
const apBtn=document.getElementById('autoplay');
const ring=document.getElementById('ring');
const ringBar=ring.querySelector('i');
function startAuto(){
  if(autoplay)return;
  ring.classList.add('on');
  apBtn.textContent='⏸ Pausar';
  const tick=()=>{
    gsap.fromTo(ringBar,{width:'0%'},{width:'100%',duration:7,ease:'none',onComplete:()=>{
      transition(i+1<currentSlides.length?i+1:0,'right');
      tick();
    }});
  };
  tick();
  autoplay=true;
}
function stopAuto(){
  if(!autoplay)return;
  gsap.killTweensOf(ringBar);
  gsap.set(ringBar,{width:'0%'});
  ring.classList.remove('on');
  apBtn.textContent='▶ Autoplay';
  autoplay=null;
}
apBtn.onclick=()=>autoplay?stopAuto():startAuto();
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ')transition(i+1,'right');
  if(e.key==='ArrowLeft'||e.key==='PageUp')transition(i-1,'left');
  if(e.key==='Home')transition(0,'left');
  if(e.key==='End')transition(currentSlides.length-1,'right');
  if(e.key.toLowerCase()==='p')autoplay?stopAuto():startAuto();
  if(e.key.toLowerCase()==='f'){if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();else document.exitFullscreen?.();}
});
let touchY=0,touchX=0;
document.addEventListener('touchstart',e=>{touchY=e.touches[0].clientY;touchX=e.touches[0].clientX});
document.addEventListener('touchend',e=>{
  const dy=touchY-e.changedTouches[0].clientY;
  const dx=touchX-e.changedTouches[0].clientX;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){transition(i+(dx>0?1:-1),dx>0?'right':'left');return}
  if(Math.abs(dy)>40)transition(i+(dy>0?1:-1),dy>0?'right':'left');
});
let wlock=false;
document.addEventListener('wheel',e=>{
  if(wlock||Math.abs(e.deltaY)<35)return;
  wlock=true;transition(i+(e.deltaY>0?1:-1),e.deltaY>0?'right':'left');
  setTimeout(()=>wlock=false,800);
},{passive:true});

/* ============================================================
   PARTICLES (subtle gold dust)
============================================================ */
const cv=document.getElementById('fx');
const ctx=cv.getContext('2d');
let pts=[];
function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio}
addEventListener('resize',resize);resize();
function spawn(n){pts=Array.from({length:n},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.6*devicePixelRatio+.4,vx:(Math.random()-.5)*.15,vy:(Math.random()-.5)*.15,a:Math.random()*.6+.2}))}
spawn(70);
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  for(const p of pts){
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=cv.width;if(p.x>cv.width)p.x=0;
    if(p.y<0)p.y=cv.height;if(p.y>cv.height)p.y=0;
    ctx.fillStyle=`rgba(212,165,116,${p.a})`;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  requestAnimationFrame(draw);
}
draw();

/* ============================================================
   INIT
============================================================ */
setVertical('aesthetics');
</script>
