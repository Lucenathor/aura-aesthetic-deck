<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>AURA · El SaaS escalable para clínicas estéticas</title>
<meta name="description" content="Embudo Meta Ads que más convierte en estética 2026 + chat IA que reserva la cita + confirmaciones IA. SaaS escalable: banco de anuncios mensual, webinars diarios ilimitados, CRM integrado." />
<meta name="theme-color" content="#0e0408" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap">
<style>
:root{
  --bg:#FBF7F2;--ink:#1a0b10;--berry:#5e1a2a;--berry2:#8B2A3F;
  --rose:#D4A574;--gold:#caa05a;--cream:#f5ecdc;--muted:#7a5d63;
  --line:rgba(94,26,42,.15);--accent:rgba(212,165,116,.18);
  --ease:cubic-bezier(.23,1,.32,1);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;min-height:100%;min-height:100dvh;overflow-x:hidden}
body{overscroll-behavior:none}
h1,h2,h3,h4,.serif{font-family:'Cormorant Garamond',Georgia,serif;letter-spacing:-.012em;font-weight:600;line-height:1.06}
h1{font-size:clamp(2.1rem,8vw,5.6rem)}
h2{font-size:clamp(1.7rem,6vw,3.6rem)}
h3{font-size:clamp(1.2rem,4vw,1.8rem)}
em{font-style:italic;color:var(--berry2)}
.muted{color:var(--muted)}
button{font:inherit;border:0;cursor:pointer;color:inherit;background:transparent}

#deck{position:fixed;inset:0;overflow:hidden}
.slide{position:absolute;inset:0;padding:calc(var(--safe-top) + 64px) 22px calc(var(--safe-bot) + 92px);overflow-y:auto;-webkit-overflow-scrolling:touch;opacity:0;visibility:hidden;transform:translate3d(20px,0,0);transition:transform .55s var(--ease),opacity .45s var(--ease),visibility 0s .55s}
.slide.active{opacity:1;visibility:visible;transform:none;transition:transform .55s var(--ease),opacity .45s var(--ease),visibility 0s}
.slide.exit-left{transform:translate3d(-20px,0,0);opacity:0}
.slide.dark{color:var(--cream);background:linear-gradient(160deg,#0e0408 0%,#27101b 60%,#3a141d 100%)}
.slide.dark .muted{color:#c9b8b3}
.slide.dark h1,.slide.dark h2,.slide.dark h3{color:#fff}
.slide.dark em{color:var(--rose)}
.container{max-width:920px;margin:0 auto}

.topbar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:.5rem;padding:calc(var(--safe-top) + 10px) 14px 10px;background:linear-gradient(180deg,rgba(251,247,242,.85),rgba(251,247,242,0));backdrop-filter:blur(10px);transition:background .3s}
body.dark-bar .topbar{background:linear-gradient(180deg,rgba(14,4,8,.7),rgba(14,4,8,0))}
.brand{display:flex;align-items:center;gap:.5rem;font-family:'Cormorant Garamond';font-size:1.1rem;letter-spacing:.06em;color:var(--ink);background:rgba(255,255,255,.55);backdrop-filter:blur(10px);padding:.32rem .7rem;border-radius:999px;border:1px solid var(--line)}
body.dark-bar .brand{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(212,165,116,.25)}
.brand .logo{width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff,var(--gold) 60%,var(--berry) 110%);box-shadow:0 0 12px rgba(212,165,116,.5)}
.vsw{display:flex;gap:.25rem;background:rgba(255,255,255,.55);backdrop-filter:blur(10px);padding:.2rem;border-radius:999px;border:1px solid var(--line);overflow-x:auto;scrollbar-width:none;max-width:64vw}
body.dark-bar .vsw{background:rgba(255,255,255,.08);border-color:rgba(212,165,116,.25)}
.vsw::-webkit-scrollbar{display:none}
.vsw button{padding:.36rem .7rem;border-radius:999px;font-size:.72rem;font-weight:600;color:var(--muted);white-space:nowrap;flex:none}
.vsw button.on{background:var(--berry2);color:#fff}
body.dark-bar .vsw button{color:#c9b8b3}
body.dark-bar .vsw button.on{background:var(--rose);color:#1a0b10}

.ctrls{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;align-items:center;justify-content:center;gap:.5rem;padding:10px 12px calc(var(--safe-bot) + 12px);background:linear-gradient(0deg,rgba(251,247,242,.92),rgba(251,247,242,0))}
body.dark-bar .ctrls{background:linear-gradient(0deg,rgba(14,4,8,.85),rgba(14,4,8,0))}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem .9rem;border-radius:999px;background:rgba(255,255,255,.7);backdrop-filter:blur(10px);border:1px solid var(--line);font-size:.78rem;font-weight:600;color:var(--ink);transition:transform .15s var(--ease),background .2s}
.btn:active{transform:scale(.96)}
body.dark-bar .btn{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(212,165,116,.25)}
.progress{display:flex;align-items:center;gap:6px;padding:.45rem .7rem;background:rgba(255,255,255,.7);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:999px}
body.dark-bar .progress{background:rgba(255,255,255,.08);border-color:rgba(212,165,116,.25)}
.progress span{width:6px;height:6px;border-radius:50%;background:rgba(94,26,42,.18);transition:transform .25s,background .25s}
.progress span.active{background:var(--berry2);transform:scale(1.5)}
body.dark-bar .progress span{background:rgba(245,236,220,.25)}
body.dark-bar .progress span.active{background:var(--rose)}

.pill{display:inline-flex;align-items:center;gap:.4rem;padding:.36rem .8rem;border-radius:999px;background:var(--accent);color:var(--berry2);font-size:.66rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase}
.slide.dark .pill{background:rgba(212,165,116,.22);color:#fff;border:1px solid rgba(255,255,255,.12)}
.pill .dot{width:6px;height:6px;background:var(--rose);border-radius:50%;box-shadow:0 0 0 4px rgba(212,165,116,.25);animation:pulse 2.4s infinite}
@keyframes pulse{50%{box-shadow:0 0 0 8px rgba(212,165,116,.05)}}
.gold-line{height:1px;width:64px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.1rem 0}
.kicker{font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700}

.feat{position:relative;background:rgba(255,255,255,.7);border:1px solid var(--line);border-radius:16px;padding:1rem 1.1rem;transition:transform .3s var(--ease),box-shadow .3s}
.feat .ic{width:34px;height:34px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:var(--berry2);font-weight:700;margin-bottom:.55rem;font-family:'Cormorant Garamond';font-size:.95rem}
.feat strong{font-family:'Cormorant Garamond';font-size:1.02rem;font-weight:600;display:block}
.feat p{font-size:.85rem;line-height:1.45;color:var(--muted);margin-top:.3rem}
.slide.dark .feat{background:rgba(255,255,255,.05);border-color:rgba(212,165,116,.22);color:var(--cream)}
.slide.dark .feat .ic{background:rgba(212,165,116,.2);color:var(--rose)}
.slide.dark .feat p{color:#c9b8b3}

.row{display:grid;gap:.7rem}
@media(min-width:640px){.row{grid-template-columns:repeat(2,1fr)}}
@media(min-width:980px){.row{grid-template-columns:repeat(3,1fr)}}

.list{display:grid;gap:.55rem}
.list .item{display:flex;gap:.85rem;align-items:flex-start;padding:.85rem;border-radius:14px;background:rgba(255,255,255,.55);border:1px solid var(--line)}
.slide.dark .list .item{background:rgba(255,255,255,.04);border-color:rgba(212,165,116,.18);color:var(--cream)}
.list .num{font-family:'Cormorant Garamond';font-size:1.2rem;color:var(--gold);min-width:24px;line-height:1.4}
.list strong{font-family:'Cormorant Garamond';font-size:1rem;font-weight:600;display:block}
.list p{font-size:.83rem;color:var(--muted);line-height:1.45;margin-top:.15rem}
.slide.dark .list p{color:#c9b8b3}

/* HERO */
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 0%,#3a141d,transparent 60%),radial-gradient(ellipse at 80% 100%,#5e1a2a,transparent 55%),#0e0408;overflow:hidden}
.hero-bg::before,.hero-bg::after{content:"";position:absolute;border-radius:50%;filter:blur(60px);opacity:.5;animation:float 14s ease-in-out infinite}
.hero-bg::before{width:60vw;height:60vw;background:radial-gradient(circle,#D4A574,transparent 65%);top:-20%;left:-20%}
.hero-bg::after{width:70vw;height:70vw;background:radial-gradient(circle,#8B2A3F,transparent 65%);bottom:-30%;right:-25%;animation-delay:-7s}
@keyframes float{50%{transform:translate(20px,-30px) scale(1.05)}}
.gold-orb{position:absolute;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff,var(--gold) 50%,var(--berry) 90%);box-shadow:0 0 60px 10px rgba(212,165,116,.5);animation:orbBreath 4s ease-in-out infinite}
@keyframes orbBreath{50%{transform:scale(1.06);box-shadow:0 0 80px 16px rgba(212,165,116,.65)}}

/* PHONE / CHAT / QUIZ / FORM */
.phone{position:relative;margin:0 auto;width:min(280px,80vw);aspect-ratio:9/19.5;background:linear-gradient(180deg,#0e0408 0%,#1a0b10 100%);border-radius:36px;border:8px solid #1a0b10;box-shadow:0 25px 60px -25px rgba(0,0,0,.7),0 0 0 1px rgba(212,165,116,.25);overflow:hidden;color:#fff}
.phone .notch{position:absolute;top:6px;left:50%;transform:translateX(-50%);width:90px;height:18px;background:#000;border-radius:14px;z-index:5}
.phone .screen{position:absolute;inset:0;padding:34px 14px 14px;display:flex;flex-direction:column;gap:8px;font-size:.78rem}
.phone .header{display:flex;align-items:center;gap:.4rem;font-family:'Cormorant Garamond';font-size:.85rem;color:#fff;background:rgba(255,255,255,.06);border:1px solid rgba(212,165,116,.25);padding:.35rem .55rem;border-radius:12px}
.phone .header .av{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle,#fff,var(--gold));box-shadow:0 0 10px rgba(212,165,116,.6)}
.phone .header span small{display:block;font-size:.55rem;color:#c9b8b3;letter-spacing:.1em;text-transform:uppercase;font-family:'Inter';margin-top:1px}

.bubble{max-width:85%;padding:.5rem .7rem;border-radius:14px;font-size:.78rem;line-height:1.35;animation:bIn .35s var(--ease) both}
@keyframes bIn{from{opacity:0;transform:translateY(6px)}}
.bubble.ai{background:rgba(255,255,255,.08);border:1px solid rgba(212,165,116,.2);color:#f5ecdc;align-self:flex-start;border-bottom-left-radius:6px}
.bubble.me{background:linear-gradient(135deg,#8B2A3F,#5e1a2a);align-self:flex-end;color:#fff;border-bottom-right-radius:6px}
.typing{display:inline-flex;gap:3px;padding:.45rem .6rem;background:rgba(255,255,255,.08);border:1px solid rgba(212,165,116,.2);border-radius:14px;border-bottom-left-radius:6px;align-self:flex-start}
.typing i{width:5px;height:5px;border-radius:50%;background:#f5ecdc;animation:tDot 1s infinite}
.typing i:nth-child(2){animation-delay:.18s}.typing i:nth-child(3){animation-delay:.36s}
@keyframes tDot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

/* QUIZ OPTIONS */
.metaform .opt{display:block;padding:.5rem .65rem;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(212,165,116,.2);color:#f5ecdc;font-size:.78rem;transition:background .25s,border-color .25s,transform .15s var(--ease)}
.metaform .opt.sel{background:linear-gradient(135deg,rgba(212,165,116,.35),rgba(94,26,42,.35));border-color:var(--rose);color:#fff;transform:translateX(2px)}

/* META INSTANT FORM */
.metaform{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:1px solid rgba(212,165,116,.2);border-radius:14px;padding:.75rem .8rem;font-size:.78rem;color:#f5ecdc}
.metaform .meta-head{display:flex;align-items:center;gap:.4rem;margin-bottom:.5rem;padding-bottom:.4rem;border-bottom:1px solid rgba(212,165,116,.15)}
.metaform .meta-logo{width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#0866ff,#6e3df5);display:grid;place-items:center;color:#fff;font-weight:700;font-size:.65rem}
.metaform .meta-head span{font-family:'Cormorant Garamond';font-size:.85rem;color:#fff}
.metaform .field{margin-bottom:.45rem}
.metaform .field label{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--rose);font-weight:600;display:block;margin-bottom:2px}
.metaform .field .input{background:rgba(255,255,255,.06);border:1px solid rgba(212,165,116,.2);border-radius:8px;padding:.4rem .55rem;min-height:1.6rem;display:flex;align-items:center;color:#f5ecdc}
.metaform .field .input .typed{display:inline-block;border-right:2px solid var(--rose);animation:caret 1s infinite}
@keyframes caret{50%{border-color:transparent}}
.metaform .btn-submit{background:linear-gradient(135deg,#0866ff,#6e3df5);color:#fff;width:100%;padding:.5rem;border-radius:8px;font-weight:600;text-align:center;font-size:.78rem;margin-top:.3rem;animation:btnPulse 2s ease-in-out infinite}
@keyframes btnPulse{50%{box-shadow:0 0 0 6px rgba(110,61,245,.15)}}

/* CALENDAR */
.cal{background:rgba(255,255,255,.04);border:1px solid rgba(212,165,116,.22);border-radius:12px;padding:.7rem;color:#f5ecdc}
.cal .cal-head{font-family:'Cormorant Garamond';font-size:.85rem;color:#fff;margin-bottom:.4rem;display:flex;justify-content:space-between;align-items:center}
.cal .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.cal .slot{padding:.35rem .2rem;text-align:center;font-size:.7rem;background:rgba(255,255,255,.04);border:1px solid rgba(212,165,116,.18);border-radius:6px;color:#f5ecdc;transition:background .25s}
.cal .slot.taken{opacity:.35;text-decoration:line-through}
.cal .slot.sel{background:linear-gradient(135deg,#D4A574,#8B2A3F);color:#fff;border-color:var(--rose);font-weight:700}
.cal .confirm{margin-top:.5rem;padding:.5rem;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.4);border-radius:8px;color:#a7f3d0;font-size:.72rem;text-align:center;display:flex;align-items:center;justify-content:center;gap:.3rem;animation:bIn .4s var(--ease) both}
.cal .confirm.hidden{display:none}

/* REMINDER TIMELINE */
.timeline-rem{display:grid;gap:.55rem}
.tline{display:flex;align-items:center;gap:.7rem;padding:.7rem .85rem;background:rgba(255,255,255,.04);border:1px solid rgba(212,165,116,.22);border-radius:12px;animation:bIn .5s var(--ease) both}
.tline .when{font-family:'Cormorant Garamond';font-size:.95rem;color:var(--rose);min-width:80px}
.tline .what{flex:1;font-size:.82rem;color:#f5ecdc}
.tline .what small{display:block;font-size:.65rem;color:#c9b8b3;margin-top:2px;letter-spacing:.08em;text-transform:uppercase}
.tline .ic{width:28px;height:28px;border-radius:50%;background:rgba(212,165,116,.2);display:grid;place-items:center;color:var(--rose);font-size:.85rem;flex:none}
.tline.success{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.35)}
.tline.success .ic{background:rgba(34,197,94,.25);color:#a7f3d0}

/* WEBINAR */
.webinar{background:linear-gradient(180deg,rgba(0,0,0,.4),rgba(0,0,0,.2));border:1px solid rgba(212,165,116,.25);border-radius:16px;padding:.9rem .95rem;color:#fff;position:relative;overflow:hidden}
.webinar::before{content:"";position:absolute;top:8px;right:8px;width:8px;height:8px;background:#ef4444;border-radius:50%;animation:liveDot 1.5s infinite}
@keyframes liveDot{50%{opacity:.4;box-shadow:0 0 0 8px rgba(239,68,68,0)}}
.webinar .live-tag{position:absolute;top:6px;right:22px;font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:#ef4444;font-weight:700}
.webinar h4{font-family:'Cormorant Garamond';font-size:1.1rem;color:#fff;margin-bottom:.2rem}
.webinar .speaker{font-size:.7rem;color:#c9b8b3;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem}
.webinar .viewers{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--rose);margin-top:.55rem}
.webinar .views-num{font-family:'Cormorant Garamond';font-size:1.1rem;color:var(--rose);font-weight:700}
.webinar .session{padding:.5rem .65rem;background:rgba(255,255,255,.05);border:1px solid rgba(212,165,116,.15);border-radius:10px;font-size:.78rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.6rem}
.webinar .session .hour{font-family:'Cormorant Garamond';color:var(--rose);min-width:60px;font-size:.95rem}
.webinar .session .topic{flex:1;color:#f5ecdc}
.webinar .session .topic small{display:block;font-size:.62rem;color:#c9b8b3;letter-spacing:.06em;text-transform:uppercase;margin-top:1px}

/* AD BANK */
.adbank{display:grid;gap:.45rem;grid-template-columns:repeat(5,1fr)}
.adcard{aspect-ratio:9/16;border-radius:8px;background:linear-gradient(160deg,#3a141d,#8B2A3F);position:relative;overflow:hidden;border:1px solid rgba(212,165,116,.25);animation:reelIn .55s var(--ease) both}
.adcard::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 30% 30%,rgba(212,165,116,.45),transparent 60%)}
.adcard::after{content:"▶";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,.7);font-size:.85rem}
.adcard .ad-tag{position:absolute;top:4px;left:4px;font-size:.5rem;letter-spacing:.1em;color:rgba(255,255,255,.7);background:rgba(0,0,0,.4);padding:1px 4px;border-radius:3px}
@keyframes reelIn{from{opacity:0;transform:translateY(20px) scale(.9)}}

/* META AD MOCK (anuncio en feed) */
.metaad{background:rgba(255,255,255,.04);border:1px solid rgba(212,165,116,.22);border-radius:12px;padding:.55rem .65rem;color:#f5ecdc;font-size:.78rem}
.metaad .head-ad{display:flex;align-items:center;gap:.45rem;margin-bottom:.4rem}
.metaad .head-ad .ad-av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#D4A574,#8B2A3F)}
.metaad .head-ad strong{font-family:'Cormorant Garamond';font-size:.85rem;color:#fff}
.metaad .head-ad small{display:block;font-size:.55rem;color:#9ca0a8;letter-spacing:.08em;text-transform:uppercase}
.metaad .ad-img{aspect-ratio:4/5;border-radius:8px;background:radial-gradient(circle at 40% 35%,#D4A574 0%,#8B2A3F 60%,#0e0408 100%);position:relative;overflow:hidden;margin:.3rem 0}
.metaad .ad-img::after{content:attr(data-text);position:absolute;left:8px;right:8px;bottom:8px;color:#fff;font-family:'Cormorant Garamond';font-size:1rem;line-height:1.15;text-shadow:0 2px 10px rgba(0,0,0,.6)}
.metaad .cta-ad{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.06);border:1px solid rgba(212,165,116,.2);border-radius:6px;padding:.35rem .55rem;font-size:.72rem}
.metaad .cta-ad strong{font-family:'Cormorant Garamond';color:#fff;font-size:.85rem;display:block}
.metaad .cta-ad small{font-size:.55rem;color:#9ca0a8;letter-spacing:.06em;text-transform:uppercase}
.metaad .cta-ad .cta-btn{background:linear-gradient(135deg,#D4A574,#8B2A3F);color:#fff;padding:.32rem .55rem;border-radius:6px;font-size:.7rem;font-weight:600}

/* DASHBOARD MOCK */
.dash{border-radius:16px;overflow:hidden;background:#fff;border:1px solid var(--line);box-shadow:0 25px 60px -25px rgba(94,26,42,.4)}
.dash .head{background:#1a0b10;color:#fff;padding:.7rem .9rem;display:flex;align-items:center;gap:.55rem;font-family:'Cormorant Garamond';font-size:.95rem}
.dash .head .av{width:18px;height:18px;border-radius:50%;background:radial-gradient(circle,#fff,var(--gold))}
.dash .body{padding:.7rem .8rem .9rem;display:grid;gap:.55rem}
.dash .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-bottom:.4rem}
.dash .stat{background:rgba(212,165,116,.1);border:1px solid var(--line);border-radius:10px;padding:.45rem .55rem;text-align:center}
.dash .stat b{display:block;font-family:'Cormorant Garamond';font-size:1.4rem;color:var(--berry2);line-height:1}
.dash .stat span{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600}
.dash .lead{display:flex;align-items:center;gap:.55rem;padding:.5rem .55rem;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:.78rem;animation:rowIn .55s var(--ease) both}
@keyframes rowIn{from{opacity:0;transform:translateY(8px)}}
.dash .lead .pic{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#D4A574,#8B2A3F);flex:none}
.dash .lead .who{flex:1;font-weight:600;color:var(--ink);font-family:'Cormorant Garamond';font-size:.95rem}
.dash .lead .who small{display:block;font-family:'Inter';font-weight:400;font-size:.65rem;color:var(--muted);margin-top:1px}
.dash .lead .tag{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:.18rem .42rem;border-radius:6px}
.dash .lead .tag.hot{background:rgba(139,42,63,.15);color:var(--berry2)}
.dash .lead .tag.book{background:rgba(34,197,94,.15);color:#16a34a}

/* FUNNEL STEPS */
.funnel{display:grid;gap:.55rem}
.funnel .fstep{display:grid;grid-template-columns:32px 1fr;gap:.7rem;align-items:flex-start;padding:.65rem .8rem;border-radius:12px;background:rgba(255,255,255,.55);border:1px solid var(--line);position:relative}
.slide.dark .funnel .fstep{background:rgba(255,255,255,.04);border-color:rgba(212,165,116,.18)}
.funnel .fstep:not(:last-child)::after{content:"";position:absolute;left:25px;top:100%;width:1px;height:.55rem;background:linear-gradient(180deg,var(--gold),transparent)}
.funnel .fnum{width:32px;height:32px;border-radius:50%;background:rgba(212,165,116,.18);display:grid;place-items:center;font-family:'Cormorant Garamond';color:var(--gold);font-size:1.1rem;font-weight:600}
.funnel strong{font-family:'Cormorant Garamond';font-size:1rem;font-weight:600;display:block}
.funnel p{font-size:.82rem;color:var(--muted);line-height:1.4;margin-top:.1rem}
.slide.dark .funnel p{color:#c9b8b3}

/* OFFER */
.offer-table{width:100%;border-collapse:collapse;font-size:.85rem}
.offer-table tr{border-bottom:1px dashed rgba(245,236,220,.18)}
.offer-table td{padding:.55rem .25rem;color:#f5ecdc}
.offer-table td:last-child{text-align:right;font-family:'Cormorant Garamond';color:var(--rose);font-size:1rem}
.offer-table tr.total td{border-top:1px solid var(--rose);border-bottom:none;font-weight:700;padding-top:.85rem;color:#fff}
.offer-table tr.total td:last-child{font-size:1.4rem;color:var(--gold)}
.price-box{padding:1.2rem 1.4rem;border-radius:18px;background:linear-gradient(135deg,#0e0408,#3a141d);color:#f5ecdc;text-align:center;border:1px solid rgba(212,165,116,.3);box-shadow:0 25px 60px -25px rgba(0,0,0,.6)}
.price-box .big{font-family:'Cormorant Garamond';font-size:2.7rem;color:var(--rose);line-height:1}

/* VERTICAL CARDS */
.vlist{display:grid;gap:.5rem;grid-template-columns:repeat(2,1fr)}
@media(min-width:640px){.vlist{grid-template-columns:repeat(3,1fr)}}
.vcard{padding:.85rem .9rem;border-radius:14px;background:rgba(255,255,255,.55);border:1px solid var(--line);transition:transform .25s var(--ease),background .25s}
.vcard:active{transform:scale(.97)}
.vcard b{display:block;font-family:'Cormorant Garamond';font-size:1.05rem;color:var(--ink);margin-bottom:2px}
.vcard span{font-size:.72rem;color:var(--muted);line-height:1.4}

.btn-cta{display:inline-flex;align-items:center;gap:.5rem;background:linear-gradient(135deg,var(--rose),var(--berry2));color:#fff;padding:.85rem 1.4rem;border-radius:999px;font-weight:700;letter-spacing:.04em;box-shadow:0 18px 40px -18px rgba(139,42,63,.7)}
.btn-cta:active{transform:scale(.97)}
.hint{position:fixed;bottom:calc(var(--safe-bot) + 78px);left:50%;transform:translateX(-50%);font-size:.6rem;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;z-index:40;opacity:.6;pointer-events:none}
body.dark-bar .hint{color:#c9b8b3}

.r{opacity:0;transform:translateY(16px);transition:opacity .55s var(--ease),transform .55s var(--ease)}
.slide.active .r{opacity:1;transform:none}
.slide.active .r:nth-child(2){transition-delay:.05s}
.slide.active .r:nth-child(3){transition-delay:.1s}
.slide.active .r:nth-child(4){transition-delay:.15s}
.slide.active .r:nth-child(5){transition-delay:.2s}
.slide.active .r:nth-child(6){transition-delay:.25s}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms !important;transition-duration:0.01ms !important}
}
</style>

/* ============== RUNTIME ============== */
const deck=document.getElementById('deck');
const vsw=document.getElementById('vsw');
const progress=document.getElementById('progress');
let i=0,slides=[],V=null,timers=[];

Object.entries(VERT).forEach(([k,v])=>{
  const b=document.createElement('button');
  b.dataset.k=k;b.textContent=v.label;
  b.onclick=()=>setVertical(k);
  vsw.appendChild(b);
});

function setVertical(key){
  V=VERT[key];
  document.body.dataset.vertical=key;
  const t=V.theme,r=document.documentElement.style;
  r.setProperty('--bg',t.bg);r.setProperty('--ink',t.ink);
  r.setProperty('--berry',t.berry);r.setProperty('--berry2',t.berry2);
  r.setProperty('--rose',t.rose);r.setProperty('--gold',t.gold);
  r.setProperty('--cream',t.cream);r.setProperty('--muted',t.muted);
  r.setProperty('--line',t.line);r.setProperty('--accent',t.accent);
  document.title=`AURA ${V.label} · pitch deck`;
  [...vsw.children].forEach(b=>b.classList.toggle('on',b.dataset.k===key));

  slides=SL(V);
  deck.innerHTML='';progress.innerHTML='';
  slides.forEach((s,k)=>{
    const sec=document.createElement('section');
    sec.className='slide'+(s.dark?' dark':'');
    sec.innerHTML=s.build();
    deck.appendChild(sec);
    const dot=document.createElement('span');progress.appendChild(dot);
    sec.querySelectorAll('[data-go]').forEach(c=>c.addEventListener('click',()=>{setVertical(c.dataset.go);go(0)}));
  });
  go(Math.min(i,slides.length-1));
}

function go(n){
  n=Math.max(0,Math.min(slides.length-1,n));
  timers.forEach(t=>clearTimeout(t));timers=[];
  [...deck.children].forEach((el,k)=>{
    el.classList.remove('exit-left');
    if(k===n){el.classList.add('active');setTimeout(()=>animateContent(k,el),50)}
    else if(k===i){el.classList.remove('active');el.classList.add('exit-left')}
    else{el.classList.remove('active','exit-left')}
  });
  [...progress.children].forEach((el,k)=>el.classList.toggle('active',k===n));
  document.body.classList.toggle('dark-bar',!!slides[n].dark);
  i=n;
}

function animateContent(idx,slide){
  if(slide.querySelector('#adbank'))playAdBank(slide);
  if(slide.querySelector('#qOptions'))playQuizMulti(slide);
  if(slide.querySelector('#chatBox'))playChat(slide);
  if(slide.querySelector('#viewerCount'))playViewers(slide);
  if(slide.querySelector('#leadList'))playDash(slide);
}

/* ANIM: AD BANK */
function playAdBank(slide){
  const bank=slide.querySelector('#adbank');bank.innerHTML='';
  ['Hook 01','Hook 02','Hook 03','Hook 04','Hook 05'].forEach((h,k)=>{
    const c=document.createElement('div');c.className='adcard';c.style.animationDelay=(k*80)+'ms';
    c.innerHTML=`<span class="ad-tag">${h}</span>`;
    bank.appendChild(c);
  });
}

/* ANIM: QUIZ MULTI-STEP */
function playQuizMulti(slide){
  const bar=slide.querySelector('#qBar');
  const step=slide.querySelector('#qstep');
  const title=slide.querySelector('#qTitle');
  const optsBox=slide.querySelector('#qOptions');
  if(!bar||!optsBox)return;
  const questions=[
    {q:'¿Qué te llevaría a dar el paso?',o:['Sentirme mejor conmigo','Tengo un evento próximo','Aún me informo','Llevo años pensándolo']},
    {q:'¿Qué tratamiento te interesa más?',o:['Labios glow','Rinomodelación','HIFU lifting','Otro']},
    {q:'¿En qué plazo lo harías?',o:['Esta semana','Este mes','En 2-3 meses','No tengo prisa']},
    {q:'¿Has hecho algún tratamiento antes?',o:['Nunca','Una vez','Varias veces','Paciente habitual']},
    {q:'¿Cuál es tu mayor preocupación?',o:['Naturalidad','Precio','Recuperación','Resultados']}
  ];
  let s=0;
  const renderOptions=(arr)=>{optsBox.innerHTML=arr.map(o=>`<span class="opt">${o}</span>`).join('');};
  const cycle=()=>{
    const Q=questions[s];
    title.textContent=Q.q;
    renderOptions(Q.o);
    const opts=[...optsBox.querySelectorAll('.opt')];
    bar.style.width=((s+1)*20)+'%';
    if(step)step.textContent=s+1;
    timers.push(setTimeout(()=>{
      const target=opts[Math.floor(Math.random()*opts.length)];
      if(target)target.classList.add('sel');
    },650));
    s=(s+1)%questions.length;
    timers.push(setTimeout(cycle,2400));
  };
  cycle();
}

/* ANIM: CHAT + CALENDAR */
function playChat(slide){
  const box=slide.querySelector('#chatBox');
  const calBox=slide.querySelector('#calBox');
  const calConfirm=slide.querySelector('#calConfirm');
  if(!box)return;
  box.innerHTML='';
  const msgs=V.chat;
  let k=0;
  const next=()=>{
    if(k>=msgs.length){
      // Después del chat, abre el calendario y confirma la cita
      timers.push(setTimeout(()=>{if(calBox)calBox.style.display='block'},700));
      timers.push(setTimeout(()=>{if(calConfirm)calConfirm.classList.remove('hidden')},2200));
      timers.push(setTimeout(()=>{
        // restart loop
        box.innerHTML='';
        if(calBox)calBox.style.display='none';
        if(calConfirm)calConfirm.classList.add('hidden');
        k=0;next();
      },5800));
      return;
    }
    const m=msgs[k];
    if(m.who==='ai'){
      const ty=document.createElement('div');ty.className='typing';ty.innerHTML='<i></i><i></i><i></i>';
      box.appendChild(ty);
      timers.push(setTimeout(()=>{
        ty.remove();
        const b=document.createElement('div');b.className='bubble ai';b.textContent=m.t;box.appendChild(b);
        k++;timers.push(setTimeout(next,m.t.length*22+500));
      },900));
    }else{
      const b=document.createElement('div');b.className='bubble me';b.textContent=m.t;box.appendChild(b);
      k++;timers.push(setTimeout(next,800));
    }
  };
  next();
}

/* ANIM: VIEWERS COUNTER */
function playViewers(slide){
  const el=slide.querySelector('#viewerCount');
  if(!el)return;
  let n=183;el.textContent=n;
  const tick=()=>{n+=Math.floor(Math.random()*5)-1;if(n<170)n=183;el.textContent=n;timers.push(setTimeout(tick,1100))};
  tick();
}

/* ANIM: DASHBOARD */
function playDash(slide){
  const list=slide.querySelector('#leadList');
  const kL=slide.querySelector('#kLeads');
  const kB=slide.querySelector('#kBook');
  const kS=slide.querySelector('#kShow');
  const sample=[
    ['Camila R.','Instagram · Lips Glow','book'],
    ['María F.','Reels · Skin Boost','book'],
    ['Andrea S.','Facebook · Rinomod.','hot'],
    ['Valentina K.','WhatsApp · Botox','book'],
    ['Daniela P.','Instagram · Full Face','hot'],
    ['Sofía M.','Reels · Hilos','book'],
  ];
  const animCount=(el,end,suf="")=>{
    let n=0;const dur=1100;const t0=performance.now();
    const step=(t)=>{const p=Math.min(1,(t-t0)/dur);n=end*(1-Math.pow(1-p,3));el.textContent=Math.round(n)+suf;if(p<1)requestAnimationFrame(step)};
    requestAnimationFrame(step);
  };
  list.innerHTML='';
  timers.push(setTimeout(()=>animCount(kL,142),200));
  timers.push(setTimeout(()=>animCount(kB,89),400));
  timers.push(setTimeout(()=>animCount(kS,91,'%'),600));
  sample.forEach((s,k)=>{
    timers.push(setTimeout(()=>{
      const row=document.createElement('div');row.className='lead';
      row.innerHTML=`<div class="pic"></div><div class="who">${s[0]}<small>${s[1]}</small></div><span class="tag ${s[2]}">${s[2]==='book'?'reservada':'caliente'}</span>`;
      list.appendChild(row);
    },800+k*220));
  });
}

/* navigation */
document.getElementById('next').onclick=()=>go(i+1);
document.getElementById('prev').onclick=()=>go(i-1);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ')go(i+1);
  if(e.key==='ArrowLeft'||e.key==='PageUp')go(i-1);
});
let touchY=0,touchX=0;
document.addEventListener('touchstart',e=>{touchY=e.touches[0].clientY;touchX=e.touches[0].clientX},{passive:true});
document.addEventListener('touchend',e=>{
  const dy=touchY-e.changedTouches[0].clientY;
  const dx=touchX-e.changedTouches[0].clientX;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)){go(i+(dx>0?1:-1));return}
  if(Math.abs(dy)>60)go(i+(dy>0?1:-1));
},{passive:true});

setVertical('aesthetics');
</script>
