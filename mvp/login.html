<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AURA · Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#F7EFE8;--bg2:#F0E4D8;--card:#fff;--ink:#2A211C;--ink-soft:#6B5D52;--muted:#9C8C7E;--terra:#C8745A;--terra-d:#A85942;--champ:#C9A86A;--line:#EAE0D2;--ease:cubic-bezier(.2,.8,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.2rem;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:-20%;background:radial-gradient(45% 40% at 12% 35%,rgba(200,116,90,.24),transparent 60%),radial-gradient(50% 45% at 88% 75%,rgba(201,168,106,.28),transparent 60%),radial-gradient(40% 40% at 80% 95%,rgba(255,240,200,.55),transparent 60%);pointer-events:none;animation:aurora 16s ease-in-out infinite alternate}
@keyframes aurora{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-3%,2%) scale(1.06)}100%{transform:translate(3%,-2%) scale(1.04)}}
@media (prefers-reduced-motion: reduce){body::before{animation:none}}
/* chispas doradas */
.spark{position:fixed;width:5px;height:5px;border-radius:50%;background:radial-gradient(circle,#E8C77E,rgba(232,199,126,0));pointer-events:none;z-index:1;opacity:0;animation:floatUp linear infinite}
@keyframes floatUp{0%{transform:translateY(20px) scale(.6);opacity:0}15%{opacity:.9}100%{transform:translateY(-120px) scale(1.1);opacity:0}}
/* ramas decorativas */
.branch{position:fixed;opacity:.5;pointer-events:none;z-index:0}
.branch.tr{top:-30px;right:-20px;width:340px;transform:rotate(8deg)}
.wrap-center{position:relative;z-index:2;width:100%;max-width:430px;display:flex;flex-direction:column;align-items:center}
.brand-top{position:relative;text-align:center;margin-bottom:1.6rem;z-index:2;opacity:0;animation:rise .6s var(--ease) .05s forwards}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.brand-top .wm{font-family:'Fraunces',serif;font-weight:500;font-size:1.9rem;letter-spacing:.22em;color:var(--terra-d)}
.brand-top .tag{font-size:.6rem;letter-spacing:.34em;text-transform:uppercase;color:var(--muted);margin-top:.2rem}
.box{position:relative;z-index:2;width:100%;max-width:430px;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.7);border-radius:28px;padding:2.8rem 2.2rem 2.2rem;box-shadow:0 50px 100px -40px rgba(42,33,28,.45);opacity:0;animation:rise .7s var(--ease) .18s forwards}
.box>*{opacity:0;animation:rise .55s var(--ease) forwards}
.box .lo{animation-delay:.32s}
.box h1{animation-delay:.40s}
.box .divider{animation-delay:.46s}
.box .sub{animation-delay:.52s}
.box .step{animation-delay:.58s}
.box .foot{animation-delay:.66s}
.lo{position:relative;width:74px;height:74px;border-radius:50%;background:radial-gradient(circle at 50% 35%,#fff,#F7EFE8);border:1px solid var(--champ);display:grid;place-items:center;font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:2.3rem;color:var(--terra-d);margin:-3.4rem auto 1.1rem;box-shadow:0 14px 30px -14px rgba(176,93,68,.4)}
.lo::after{content:"";position:absolute;inset:-8px;border-radius:50%;border:1px solid var(--champ);opacity:.5;animation:halo 2.6s ease-in-out infinite}
@keyframes halo{0%,100%{transform:scale(1);opacity:.45}50%{transform:scale(1.14);opacity:0}}
h1{font-family:'Fraunces',serif;font-weight:500;font-size:2rem;text-align:center;letter-spacing:-.01em}
.divider{display:flex;align-items:center;justify-content:center;gap:.6rem;margin:.7rem 0 .2rem}
.divider .ln{width:46px;height:1px;background:linear-gradient(90deg,transparent,var(--champ))}
.divider .ln.r{background:linear-gradient(90deg,var(--champ),transparent)}
.divider .st{color:var(--champ);font-size:.8rem}
.sub{text-align:center;color:var(--muted);font-size:.92rem;margin-top:.4rem;margin-bottom:1.6rem;line-height:1.5}
.inwrap{position:relative}
.inwrap .eico{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--muted)}
.inwrap input{padding-left:2.7rem}
label{display:block;font-size:.82rem;font-weight:600;color:var(--ink-soft);margin-bottom:.4rem}
input{width:100%;padding:.85rem 1rem;border-radius:12px;border:1px solid var(--line);font-size:1rem;font-family:inherit;outline:none;transition:border .16s}
input:focus{border-color:var(--terra)}
.code-input{text-align:center;font-size:1.6rem;letter-spacing:10px;font-weight:700}
.btn{position:relative;overflow:hidden;width:100%;margin-top:1.1rem;padding:.95rem;border-radius:12px;background:linear-gradient(135deg,var(--terra),var(--terra-d));color:#fff;font-weight:700;font-size:1rem;border:0;cursor:pointer;box-shadow:0 14px 30px -14px rgba(176,93,68,.6);transition:transform .16s}
.btn::after{content:"";position:absolute;top:0;left:-60%;width:50%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.45),transparent);transform:skewX(-18deg);animation:shimmer 3.6s ease-in-out infinite}
@keyframes shimmer{0%{left:-60%}55%{left:140%}100%{left:140%}}
@media (prefers-reduced-motion: reduce){.btn::after{display:none}.lo::after{animation:none}}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:default}
.msg{text-align:center;font-size:.85rem;margin-top:.9rem;min-height:1.1rem}
.msg.err{color:#c0392b}.msg.ok{color:#1f8c69}
.back{display:block;text-align:center;margin-top:1rem;font-size:.84rem;color:var(--terra-d);cursor:pointer;background:none;border:0;width:100%}
.foot{text-align:center;margin-top:1.4rem;font-size:.74rem;color:var(--muted)}
.step{display:none}.step.on{display:block}
</style>
</head>
<body>
<svg class="branch tr" viewBox="0 0 200 120" fill="none" stroke="#C9A86A" stroke-width="1"><path d="M200 10 C150 30 120 40 80 70 M120 38 q-8 -14 -22 -16 M120 38 q4 -16 18 -22 M95 55 q-9 -12 -24 -12 M95 55 q3 -16 16 -23"/></svg>
<div class="wrap-center">
<div class="brand-top"><div class="wm">AURA</div><div class="tag">Clínica Estética Avanzada</div></div>
<div class="box">
  <div class="lo">A</div>
  <h1>Tu panel AURA</h1>
  <div class="divider"><span class="ln"></span><span class="st">✦</span><span class="ln r"></span></div>
  <div class="sub" id="sub">Ingresa tu correo electrónico para recibir tu código de acceso.</div>
  <div id="rotline" style="text-align:center;font-size:.8rem;color:var(--terra-d);font-weight:600;margin:-1rem 0 1.2rem;min-height:1rem;transition:opacity .4s"></div>

  <div class="step on" id="step1">
    <label>Correo electrónico</label>
    <div class="inwrap"><svg class="eico" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg><input id="email" type="email" placeholder="tu@clinica.com" autocomplete="email"/></div>
    <button class="btn" id="sendBtn" onclick="sendCode()">Enviar código <span style="margin-left:.3rem">→</span></button>
  </div>

  <div class="step" id="step2">
    <label>Código que te hemos enviado</label>
    <input id="code" class="code-input" inputmode="numeric" maxlength="6" placeholder="000000"/>
    <button class="btn" id="verifyBtn" onclick="verify()">Entrar</button>
    <button class="back" onclick="reset()">Usar otro email</button>
  </div>

  <div class="msg" id="msg"></div>
  <div class="foot"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--champ)" stroke-width="2" style="vertical-align:-2px"><path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"/></svg> Tu información está protegida</div>
</div>
</div>
<script>
const WORKER='https://aura-chat-worker.adrian-7b9.workers.dev';
let EMAIL='';
// chispas doradas
(function(){ if(matchMedia('(prefers-reduced-motion: reduce)').matches)return; for(let i=0;i<14;i++){ const s=document.createElement('div'); s.className='spark'; s.style.left=(Math.random()*100)+'%'; s.style.bottom=(Math.random()*60)+'%'; s.style.animationDuration=(6+Math.random()*6)+'s'; s.style.animationDelay=(Math.random()*6)+'s'; document.body.appendChild(s); } })();
// frase rotativa motivadora
const ROT=['Tus pacientes te esperan dentro','Mira quién quiere reservar hoy','Tu agenda se llena sola','Cada lead, a un clic de ser paciente'];
let _ri=0; const _rl=document.getElementById('rotline');
if(_rl){ _rl.textContent=ROT[0]; setInterval(()=>{ _rl.style.opacity=0; setTimeout(()=>{ _ri=(_ri+1)%ROT.length; _rl.textContent=ROT[_ri]; _rl.style.opacity=1; },400); },3400); }
function confetti(){ if(matchMedia('(prefers-reduced-motion: reduce)').matches)return; const cols=['#C8745A','#C9A86A','#E8C77E','#A4E5CD','#fff']; for(let i=0;i<40;i++){ const c=document.createElement('div'); c.style.cssText='position:fixed;z-index:50;width:8px;height:8px;border-radius:2px;pointer-events:none;left:'+(50+(Math.random()*30-15))+'%;top:42%;background:'+cols[i%cols.length]; document.body.appendChild(c); const ang=Math.random()*Math.PI*2,vel=4+Math.random()*7,vx=Math.cos(ang)*vel,vy=Math.sin(ang)*vel-6; let x=0,y=0,t=0; const id=setInterval(()=>{ t++; x+=vx; y+=vy+t*0.6; c.style.transform='translate('+x+'px,'+y+'px) rotate('+(t*18)+'deg)'; c.style.opacity=Math.max(0,1-t/45); if(t>45){clearInterval(id);c.remove();} },16); } }
const params=new URLSearchParams(location.search);
const nextTenant=params.get('t')||'';
// si ya hay sesión, ir al dashboard
(async function(){
  const tok=localStorage.getItem('aura_token');
  if(tok){ try{ const r=await fetch(WORKER+'/api/auth/me?token='+tok); const d=await r.json(); if(d.auth){ location.href='/dashboard?t='+d.tenant_id; } }catch(e){} }
})();
function msg(t,cls){ const m=document.getElementById('msg'); m.textContent=t; m.className='msg '+(cls||''); }
async function sendCode(){
  EMAIL=document.getElementById('email').value.trim();
  if(!EMAIL.includes('@')){ msg('Pon un email válido','err'); return; }
  const b=document.getElementById('sendBtn'); b.disabled=true; b.textContent='Enviando…';
  try{
    const r=await fetch(WORKER+'/api/auth/request-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:EMAIL,tenant_id:nextTenant||undefined})});
    const d=await r.json();
    if(d.ok){ confetti(); document.getElementById('step1').classList.remove('on'); document.getElementById('step2').classList.add('on'); document.getElementById('sub').textContent='Revisa tu correo ('+EMAIL+') e introduce el código.'; msg('Código enviado','ok'); document.getElementById('code').focus(); }
    else msg(d.error||'No se pudo enviar','err');
  }catch(e){ msg('Error de conexión','err'); }
  b.disabled=false; b.textContent='Enviar código';
}
async function verify(){
  const code=document.getElementById('code').value.trim();
  if(code.length<6){ msg('El código tiene 6 dígitos','err'); return; }
  const b=document.getElementById('verifyBtn'); b.disabled=true; b.textContent='Entrando…';
  try{
    const r=await fetch(WORKER+'/api/auth/verify-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:EMAIL,code})});
    const d=await r.json();
    if(d.ok){ localStorage.setItem('aura_token',d.token); localStorage.setItem('aura_tenant',d.tenant_id); msg('Acceso correcto','ok'); location.href='/dashboard?t='+d.tenant_id; }
    else msg(d.error||'Código incorrecto','err');
  }catch(e){ msg('Error de conexión','err'); }
  b.disabled=false; b.textContent='Entrar';
}
function reset(){ document.getElementById('step2').classList.remove('on'); document.getElementById('step1').classList.add('on'); document.getElementById('sub').textContent='Entra con tu email. Te enviamos un código.'; msg(''); }
document.getElementById('email').addEventListener('keydown',e=>{if(e.key==='Enter')sendCode();});
document.getElementById('code').addEventListener('keydown',e=>{if(e.key==='Enter')verify();});
</script>
</body>
</html>
