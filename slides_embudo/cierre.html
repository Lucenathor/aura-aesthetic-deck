<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
.slide-container{width:1280px;min-height:720px;background:#0E1B2C;position:relative;overflow:hidden;font-family:'Inter',sans-serif}
.gold-bar{position:absolute;top:0;left:0;width:10px;height:100%;background:linear-gradient(180deg,#C9A86A,#C8745A)}
.corner{position:absolute;right:70px;bottom:60px;font-family:'Playfair Display',serif;font-size:150px;color:rgba(201,168,106,.10);line-height:1}
.inner{padding:96px 96px 0;display:flex;flex-direction:column;min-height:720px;justify-content:center}
.logo{height:50px;object-fit:contain;align-self:flex-start;margin-bottom:54px}
.kicker{font-size:14px;letter-spacing:.3em;text-transform:uppercase;color:#C9A86A;margin-bottom:22px;font-weight:600}
h1{font-family:'Playfair Display',serif;font-size:60px;line-height:1.08;color:#fff;font-weight:600}
.sub{font-size:21px;color:#C7D0DB;margin-top:24px;max-width:720px;line-height:1.5}
.cta{margin-top:44px;background:#15273f;border-left:4px solid #C9A86A;padding:24px 30px;display:inline-flex;align-items:center;gap:18px;max-width:760px}
.cta i{color:#C9A86A;font-size:26px}
.cta .t{font-size:13px;color:#8a97a6;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.cta .u{font-size:24px;color:#fff;font-family:'Playfair Display',serif}
.meta{margin-top:48px;font-size:15px;color:#8a97a6;letter-spacing:.05em}
</style>
</head>
<body>
<div class="slide-container">
  <div class="gold-bar"></div>
  <div class="corner">→</div>
  <div class="inner">
    <img src="/home/ubuntu/upload/logobueno.png" class="logo" alt="FOCUS">
    <div class="kicker">Vívelo como una paciente</div>
    <h1>Pruébalo tú mismo</h1>
    <div class="sub">Recorre el embudo completo: quiz, plan gratis, conversación con la IA y reserva de la valoración.</div>
    <div class="cta">
      <i class="fa-solid fa-arrow-pointer"></i>
      <div><div class="t">Embudo de aumento de labios</div><a href="https://aura-mvp.pages.dev/c/clinica-elvira" target="_blank" style="text-decoration:none"><div class="u">aura-mvp.pages.dev/c/clinica-elvira</div></a></div>
    </div>
    <div class="meta">FOCUS Consulting Group · Sistema AURA</div>
  </div>
</div>
</body>
</html>
