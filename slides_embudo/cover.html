<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
.slide-container{width:1280px;min-height:720px;background:#0E1B2C;position:relative;overflow:hidden;font-family:'Inter',sans-serif}
.gold-bar{position:absolute;top:0;left:0;width:10px;height:100%;background:linear-gradient(180deg,#C9A86A,#C8745A)}
.inner{padding:90px 96px;display:flex;flex-direction:column;min-height:720px;justify-content:center}
.logo{height:54px;object-fit:contain;margin-bottom:64px;align-self:flex-start}
.kicker{font-size:15px;letter-spacing:.32em;text-transform:uppercase;color:#C9A86A;margin-bottom:26px;font-weight:600}
h1{font-family:'Playfair Display',serif;font-size:66px;line-height:1.07;color:#fff;font-weight:600;max-width:920px}
h1 .em{color:#C9A86A}
.sub{font-size:26px;color:#C7D0DB;margin-top:30px;max-width:760px;line-height:1.45}
.rule{width:120px;height:2px;background:#C9A86A;margin:46px 0 22px}
.meta{font-size:16px;color:#8a97a6;letter-spacing:.04em}
.corner{position:absolute;right:80px;bottom:70px;font-family:'Playfair Display',serif;font-size:150px;color:rgba(201,168,106,.10);line-height:1}
</style>
</head>
<body>
<div class="slide-container">
  <div class="gold-bar"></div>
  <div class="corner">?</div>
  <div class="inner">
    <img src="/home/ubuntu/aura-presentation/brand/focus_logo.png" class="logo" alt="FOCUS">
    <div class="kicker">Sistema AURA · Embudo de conversión</div>
    <h1>Quiz Page <span class="em">vs</span> Landing Page</h1>
    <div class="sub">Cómo el embudo de AURA convierte un anuncio en una paciente de aumento de labios.</div>
    <div class="rule"></div>
    <div class="meta">FOCUS Consulting Group · Documento comercial</div>
  </div>
</div>
</body>
</html>
